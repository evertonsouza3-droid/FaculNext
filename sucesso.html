<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parabéns! Você é Premium | Score ENEM</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top right, #1a1a1a, #000);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #fff;
        }

        .success-container {
            text-align: center;
            max-width: 600px;
            padding: 50px;
            z-index: 1;
            animation: fadeInScale 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .success-icon {
            font-size: 80px;
            background: linear-gradient(135deg, #FFD700, var(--primary-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 0 20px rgba(229, 9, 20, 0.4));
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        p {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-huge {
            display: inline-block;
            background: var(--primary-red);
            color: #fff;
            padding: 20px 50px;
            border-radius: 50px;
            font-weight: 800;
            text-decoration: none;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(229, 9, 20, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
        }

        .btn-huge:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(229, 9, 20, 0.6);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: var(--primary-red);
            top: -10px;
            z-index: 0;
            border-radius: 50%;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        .bg-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(229, 9, 20, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(50px);
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="success-container glass-card">
        <div class="success-icon">🏆</div>
        <h1>Bem-vindo à Elite!</h1>
        <p>Seu acesso <strong>Premium</strong> foi ativado com sucesso. Agora você tem as ferramentas mais poderosas do Brasil para conquistar sua vaga no ENEM.</p>
        
        <a href="dashboard.html?from=success" class="btn-huge">Entrar no Dashboard 🚀</a>
    </div>

    <script>
        // Simples sistema de confete
        function createConfetti() {
            const colors = ['#E50914', '#FFD700', '#ffffff', '#ff5e62'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.opacity = Math.random();
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.width = Math.random() * 10 + 5 + 'px';
                confetti.style.height = confetti.style.width;
                document.body.appendChild(confetti);
            }
        }
        createConfetti();
    </script>
</body>
</html>
